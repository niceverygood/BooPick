<!--
  Google Play Store Feature Graphic (1024×500, 24-bit, no alpha)
  Apple App Preview / Promotional 위치에도 변형 사용 가능.

  구성: 좌측 1/3 — 부픽 아이콘 / 우측 2/3 — 한글 카피 + 영문 라인
-->
<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#243C60"/>
      <stop offset="100%" stop-color="#1A2E4C"/>
    </linearGradient>

    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243C60"/>
      <stop offset="100%" stop-color="#1A2E4C"/>
    </linearGradient>

    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8E61"/>
      <stop offset="100%" stop-color="#E2603A"/>
    </linearGradient>

    <radialGradient id="glow" cx="20%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#FF8E61" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#FF8E61" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF8E61" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- 좌측 — 미니 아이콘 (240pt 정사각, 좌측 안전영역 안에 배치) -->
  <g transform="translate(80, 130)">
    <!-- 아이콘 배경 라운드 사각 -->
    <rect width="240" height="240" rx="54" ry="54" fill="url(#iconBg)"/>

    <!-- 집 실루엣 (icon.svg와 동일 비례, 240px 컨테이너 기준) -->
    <g transform="translate(120, 120)">
      <!-- 지붕 + 본체 -->
      <path d="M -80 -10 L 0 -78 L 80 -10 L 80 64 Q 80 78 66 78 L -66 78 Q -80 78 -80 64 Z"
            fill="#FFFFFF"/>
      <!-- 창문 -->
      <rect x="-46" y="14" width="22" height="18" rx="3" fill="#1A2E4C"/>
      <rect x="24"  y="14" width="22" height="18" rx="3" fill="#1A2E4C"/>
      <!-- 문 (오렌지) -->
      <rect x="-12" y="34" width="24" height="44" rx="3" fill="url(#orange)"/>
    </g>

    <!-- 오렌지 체크 배지 (우측 상단) -->
    <g transform="translate(202, 38)">
      <circle r="34" fill="url(#orange)" stroke="#FFFFFF" stroke-width="4"/>
      <path d="M -14 0 L -4 10 L 14 -10"
            fill="none" stroke="#FFFFFF" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- 우측 — 카피 -->
  <g transform="translate(380, 0)" font-family="Apple SD Gothic Neo, Noto Sans KR, sans-serif">
    <!-- 영문 라벨 -->
    <text x="0" y="146" font-size="18" letter-spacing="6" fill="#FF8E61" font-weight="600">
      PROPERTY ANALYSIS · SaaS
    </text>

    <!-- 메인 카피 -->
    <text x="0" y="216" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-1">
      매물 4만 건을
    </text>
    <text x="0" y="284" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-1">
      30초 안에 분석.
    </text>

    <!-- 액센트 바 -->
    <rect x="0" y="316" width="64" height="4" rx="2" fill="#FF8E61"/>

    <!-- 서브 카피 -->
    <text x="0" y="364" font-size="22" fill="#CBD5E1" font-weight="400">
      공인중개사 사장님의 의뢰 분석 도구
    </text>
    <text x="0" y="394" font-size="22" fill="#CBD5E1" font-weight="400">
      AI 파싱 + 적합도 점수 + 산업 관점 PDF 리포트
    </text>

    <!-- 브랜드 -->
    <text x="0" y="454" font-size="20" fill="#94A3B8" font-weight="500">
      <tspan font-weight="700" fill="#FFFFFF">부픽</tspan>
      <tspan dx="6">BooPick · Bottle Inc.</tspan>
    </text>
  </g>
</svg>
