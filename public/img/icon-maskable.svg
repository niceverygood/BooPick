<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="부픽 (BooPick) 마스커블 아이콘"
>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243C60" />
      <stop offset="100%" stop-color="#1A2E4C" />
    </linearGradient>
    <radialGradient id="creamGlow" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#FFF9F5" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFF9F5" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="pickGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8E61" />
      <stop offset="100%" stop-color="#FF7849" />
    </linearGradient>
  </defs>

  <!-- Full-bleed 네이비 배경 (Android가 마스크 추가) -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="1024" height="1024" fill="url(#creamGlow)" />

  <!-- 안전 영역(80% = 102~922) 안에 콘텐츠 — 0.78 스케일로 중앙 -->
  <g transform="translate(112 112) scale(0.78)">
    <!-- 집 본체 -->
    <path
      d="
        M 512 256
        L 776 472
        L 776 760
        Q 776 800 736 800
        L 288 800
        Q 248 800 248 760
        L 248 472
        Z
      "
      fill="#FFFAF3"
    />
    <path
      d="M 232 480 L 512 252 L 792 480"
      stroke="#FFFAF3"
      stroke-width="48"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <g fill="#1A2E4C">
      <rect x="332" y="540" width="100" height="100" rx="14" />
      <rect x="592" y="540" width="100" height="100" rx="14" />
    </g>
    <rect x="460" y="640" width="104" height="160" rx="14" fill="#FF7849" />
    <rect x="486" y="688" width="52" height="100" rx="6" fill="#FFF9F5" opacity="0.18" />

    <!-- Pick 배지 — 마스커블에서는 더 안쪽으로 -->
    <g transform="translate(740 250)">
      <circle cx="0" cy="0" r="118" fill="url(#pickGrad)" />
      <path
        d="M -50 4 L -14 40 L 56 -38"
        stroke="#FFFFFF"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </g>
  </g>
</svg>
