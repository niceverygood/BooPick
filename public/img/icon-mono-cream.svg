<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="부픽 (BooPick) 모노톤 아이콘 — 어두운 배경용"
>
  <!-- 단색 크림 — 어두운 배경(다크 모드·네이비 카드·검정 명함 등) 용 -->
  <!-- 배경 투명. 모든 요소 #FFF9F5 단색. -->

  <rect x="48" y="48" width="928" height="928" rx="208" fill="none" stroke="#FFF9F5" stroke-width="32" />

  <path
    d="
      M 512 280
      L 760 484
      L 760 760
      Q 760 800 720 800
      L 304 800
      Q 264 800 264 760
      L 264 484
      Z
    "
    fill="#FFF9F5"
  />

  <!-- 창문/문 — 어두운 배경이 비치도록 transparent(투명) -->
  <g fill="#0B1A2F">
    <rect x="340" y="540" width="100" height="100" rx="14" />
    <rect x="584" y="540" width="100" height="100" rx="14" />
    <rect x="462" y="640" width="100" height="160" rx="14" />
  </g>

  <!-- Pick 체크 — 동일 크림 -->
  <g transform="translate(770 240)">
    <circle cx="0" cy="0" r="118" fill="#FFF9F5" />
    <path
      d="M -50 4 L -14 40 L 56 -38"
      stroke="#0B1A2F"
      stroke-width="26"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>
</svg>
